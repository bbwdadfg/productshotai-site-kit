replicaCount: 1

image:
  repository: ghcr.io/YOUR_ORG/productshotai-asset-gateway
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

workspace:
  name: ProductShot AI Assets
  assetRoot: /assets

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: productshotai-assets.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
